<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="hatch logo">
  <title>hatch</title>
  <desc>Geometric logo for hatch: a square containing a cross-hatch pattern, paired with the wordmark.</desc>

  <defs>
    <clipPath id="square-clip">
      <rect x="0" y="0" width="160" height="160"/>
    </clipPath>
  </defs>

  <g transform="translate(80, 90)">
    <g clip-path="url(#square-clip)">
      <line x1="-40" y1="40"  x2="40"  y2="-40" stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="-40" y1="80"  x2="80"  y2="-40" stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="-40" y1="120" x2="120" y2="-40" stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="-40" y1="160" x2="160" y2="-40" stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="-40" y1="200" x2="200" y2="-40" stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="0"   y1="200" x2="200" y2="0"   stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="40"  y1="200" x2="200" y2="40"  stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="80"  y1="200" x2="200" y2="80"  stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="120" y1="200" x2="200" y2="120" stroke="#E63946" stroke-width="4" stroke-linecap="square"/>

      <line x1="40"  y1="-40" x2="-40" y2="40"  stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="80"  y1="-40" x2="-40" y2="80"  stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="120" y1="-40" x2="-40" y2="120" stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="160" y1="-40" x2="-40" y2="160" stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="200" y1="-40" x2="-40" y2="200" stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="200" y1="0"   x2="0"   y2="200" stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="200" y1="40"  x2="40"  y2="200" stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="200" y1="80"  x2="80"  y2="200" stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
      <line x1="200" y1="120" x2="120" y2="200" stroke="#E63946" stroke-width="4" stroke-linecap="square"/>
    </g>

    <rect x="0" y="0" width="160" height="160" stroke="#E63946" stroke-width="6" fill="none"/>
  </g>

  <text x="290" y="210" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="500" fill="#E63946" letter-spacing="-2">hatch</text>
</svg>
