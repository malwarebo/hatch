schema_version = "1.0"
name = "github"
version = "1.2.0"
description = "Example GitHub MCP server manifest. Hand-crafted for testing; not signed."
homepage = "https://github.com/modelcontextprotocol/servers"
license = "MIT"

[command]
program = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = ["api.github.com", "*.githubusercontent.com"]
allow_dns = ["api.github.com", "*.githubusercontent.com"]
allow_http = false
rate_limit_mbps = 10
max_bytes_per_connection_mb = 100

[filesystem]
read = []
write = []
tmpfs = ["/tmp"]

[env]
passthrough = ["GITHUB_TOKEN"]
set = { NODE_OPTIONS = "--no-deprecation" }
unset = ["AWS_ACCESS_KEY_ID", "AWS_SECRET_ACCESS_KEY"]

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 512
cpu_percent = 50
pids_max = 50
nofile = 256
tool_call_timeout_seconds = 60

[tool_policy]
require_approval = ["delete_*", "force_push", "admin_*"]
deny = ["execute_arbitrary_code"]

[[tool_policy.rules]]
tool = "git.push"
when = "args.branch in ['main', 'master', 'production']"
action = "require_approval"

[[tool_policy.response_filters]]
pattern = "(?i)(api[_-]?key|secret|token)\\s*[:=]\\s*[\\w.-]+"
replacement = "[REDACTED]"

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
