schema_version = "1.0"
name = "time"
version = "0.6.2"
description = "Time/timezone MCP server: timezone conversion and clock utilities."
homepage = "https://github.com/modelcontextprotocol/servers/tree/main/src/time"
license = "MIT"

[command]
program = "uvx"
args = ["mcp-server-time"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = []
allow_dns = []
allow_http = false

[filesystem]
read = []
write = []
tmpfs = ["/tmp"]

[env]
passthrough = ["TZ"]

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 64
cpu_percent = 5
pids_max = 10
nofile = 32
tool_call_timeout_seconds = 10

[tool_policy]
require_approval = []
deny = []

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
