schema_version = "1.0"
name = "fetch"
version = "0.6.2"
description = "Fetch MCP server: HTTP fetch with safe defaults."
homepage = "https://github.com/modelcontextprotocol/servers/tree/main/src/fetch"
license = "MIT"

[command]
program = "uvx"
args = ["mcp-server-fetch"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = ["*"]
allow_dns = ["*"]
allow_http = false
rate_limit_mbps = 10
max_bytes_per_connection_mb = 50

[filesystem]
read = []
write = []
tmpfs = ["/tmp"]

[env]
passthrough = []

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 256
cpu_percent = 25
pids_max = 25
nofile = 128
tool_call_timeout_seconds = 30

[tool_policy]
require_approval = []
deny = []

[[tool_policy.rules]]
tool = "fetch"
when = "args.url.startsWith('http://')"
action = "require_approval"

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
