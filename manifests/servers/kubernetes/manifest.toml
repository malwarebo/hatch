schema_version = "1.0"
name = "kubernetes"
version = "0.7.0"
description = "Kubernetes MCP server: inspect cluster resources via kubectl."
homepage = "https://github.com/flux159/mcp-server-kubernetes"
license = "MIT"

[command]
program = "npx"
args = ["-y", "mcp-server-kubernetes"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = ["*"]
allow_dns = ["*"]
allow_http = false
rate_limit_mbps = 20

[filesystem]
read = ["$HOME/.kube"]
write = []
tmpfs = ["/tmp"]

[env]
passthrough = ["KUBECONFIG", "HOME"]

[exec]
allow_subprocess = true
allow_binaries = [
    "/usr/local/bin/kubectl",
    "/usr/bin/kubectl",
    "/opt/homebrew/bin/kubectl",
]

[resources]
memory_mb = 512
cpu_percent = 50
pids_max = 50
nofile = 256
tool_call_timeout_seconds = 60

[tool_policy]
require_approval = ["kubectl_delete", "kubectl_apply", "kubectl_patch"]
deny = []

[[tool_policy.rules]]
tool = "kubectl_delete"
when = "args.kind in ['namespace', 'persistentvolume', 'persistentvolumeclaim']"
action = "deny"

[platform.linux]
seccomp_preset = "default"
landlock = true

[platform.macos]
endpoint_security = false
