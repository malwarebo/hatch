schema_version = "1.0"
name = "github"
version = "0.6.2"
description = "Official GitHub MCP server."
homepage = "https://github.com/modelcontextprotocol/servers/tree/main/src/github"
license = "MIT"

[command]
program = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = ["api.github.com", "*.githubusercontent.com", "uploads.github.com"]
allow_dns = ["api.github.com", "*.githubusercontent.com", "uploads.github.com"]
allow_http = false
rate_limit_mbps = 10

[filesystem]
read = []
write = []
tmpfs = ["/tmp"]

[env]
passthrough = ["GITHUB_PERSONAL_ACCESS_TOKEN", "GITHUB_TOKEN"]
set = { NODE_OPTIONS = "--no-deprecation" }
unset = ["AWS_ACCESS_KEY_ID", "AWS_SECRET_ACCESS_KEY"]

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 512
cpu_percent = 50
pids_max = 50
nofile = 256
tool_call_timeout_seconds = 60

[tool_policy]
require_approval = ["delete_*", "force_push", "admin_*"]
deny = []

[[tool_policy.rules]]
tool = "push_files"
when = "args.branch in ['main', 'master', 'production', 'release']"
action = "require_approval"

[[tool_policy.rules]]
tool = "create_or_update_file"
when = "args.path.endsWith('.github/workflows/') || args.path.contains('.github/workflows/')"
action = "require_approval"

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
