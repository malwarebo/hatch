schema_version = "1.0"
name = "linear"
version = "1.0.0"
description = "Linear MCP server: query and create issues, cycles, projects."
homepage = "https://linear.app"
license = "MIT"

[command]
program = "npx"
args = ["-y", "@linear/mcp-server"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = ["api.linear.app", "uploads.linear.app"]
allow_dns = ["api.linear.app", "uploads.linear.app"]
allow_http = false

[filesystem]
read = []
write = []
tmpfs = ["/tmp"]

[env]
passthrough = ["LINEAR_API_KEY"]

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 256
cpu_percent = 25
pids_max = 25
nofile = 128
tool_call_timeout_seconds = 60

[tool_policy]
require_approval = []
deny = []

[[tool_policy.rules]]
tool = "delete_issue"
action = "require_approval"

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
