schema_version = "1.0"
name = "google-drive"
version = "0.6.2"
description = "Google Drive MCP server: list, search, and read files in Drive."
homepage = "https://github.com/modelcontextprotocol/servers/tree/main/src/gdrive"
license = "MIT"

[command]
program = "npx"
args = ["-y", "@modelcontextprotocol/server-gdrive"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = [
    "www.googleapis.com",
    "oauth2.googleapis.com",
    "accounts.google.com",
    "*.googleusercontent.com",
]
allow_dns = [
    "www.googleapis.com",
    "oauth2.googleapis.com",
    "accounts.google.com",
    "*.googleusercontent.com",
]
allow_http = false

[filesystem]
read = []
write = ["$HATCH_STATE_DIR/gdrive"]
tmpfs = ["/tmp"]

[env]
passthrough = ["GDRIVE_CREDENTIALS_PATH", "GOOGLE_APPLICATION_CREDENTIALS"]

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 256
cpu_percent = 25
pids_max = 25
nofile = 128
tool_call_timeout_seconds = 60

[tool_policy]
require_approval = []
deny = []

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
