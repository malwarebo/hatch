schema_version = "1.0"
name = "memory"
version = "0.6.2"
description = "Memory MCP server: knowledge-graph-style note storage."
homepage = "https://github.com/modelcontextprotocol/servers/tree/main/src/memory"
license = "MIT"

[command]
program = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = []
allow_dns = []
allow_http = false

[filesystem]
read = ["$HATCH_STATE_DIR/memory"]
write = ["$HATCH_STATE_DIR/memory"]
tmpfs = ["/tmp"]

[env]
passthrough = []

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 256
cpu_percent = 25
pids_max = 25
nofile = 128
tool_call_timeout_seconds = 30

[tool_policy]
require_approval = []
deny = []

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
