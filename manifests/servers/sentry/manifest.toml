schema_version = "1.0"
name = "sentry"
version = "0.6.2"
description = "Sentry MCP server: read events, issues, and projects."
homepage = "https://github.com/getsentry/sentry-mcp"
license = "Apache-2.0"

[command]
program = "npx"
args = ["-y", "@sentry/mcp-server"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = ["sentry.io", "*.sentry.io", "ingest.sentry.io"]
allow_dns = ["sentry.io", "*.sentry.io", "ingest.sentry.io"]
allow_http = false

[filesystem]
read = []
write = []
tmpfs = ["/tmp"]

[env]
passthrough = ["SENTRY_AUTH_TOKEN", "SENTRY_ORG"]

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 256
cpu_percent = 25
pids_max = 25
nofile = 128
tool_call_timeout_seconds = 60

[tool_policy]
require_approval = []
deny = []

[[tool_policy.rules]]
tool = "resolve_issue"
action = "require_approval"

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
