schema_version = "1.0"
name = "slack"
version = "0.6.2"
description = "Slack MCP server: send messages, browse channels, search threads."
homepage = "https://github.com/modelcontextprotocol/servers/tree/main/src/slack"
license = "MIT"

[command]
program = "npx"
args = ["-y", "@modelcontextprotocol/server-slack"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = ["slack.com", "files.slack.com", "edgeapi.slack.com"]
allow_dns = ["slack.com", "files.slack.com", "edgeapi.slack.com"]
allow_http = false

[filesystem]
read = []
write = []
tmpfs = ["/tmp"]

[env]
passthrough = ["SLACK_BOT_TOKEN", "SLACK_TEAM_ID"]

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 256
cpu_percent = 25
pids_max = 25
nofile = 128
tool_call_timeout_seconds = 60

[tool_policy]
require_approval = []
deny = []

[[tool_policy.rules]]
tool = "post_message"
when = "args.channel in ['#general', '#announcements', '#leadership']"
action = "require_approval"

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
