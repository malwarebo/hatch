schema_version = "1.0"
name = "puppeteer"
version = "0.6.2"
description = "Puppeteer MCP server: drive a headless Chromium browser."
homepage = "https://github.com/modelcontextprotocol/servers/tree/main/src/puppeteer"
license = "MIT"

[command]
program = "npx"
args = ["-y", "@modelcontextprotocol/server-puppeteer"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = ["*"]
allow_dns = ["*"]
allow_http = true
rate_limit_mbps = 20
max_bytes_per_connection_mb = 200

[filesystem]
read = ["$HATCH_RUNTIME_DIR"]
write = ["$HATCH_RUNTIME_DIR"]
tmpfs = ["/tmp", "/dev/shm"]

[env]
passthrough = ["DISPLAY"]
set = { PUPPETEER_DOWNLOAD_PATH = "$HATCH_RUNTIME_DIR/puppeteer" }

[exec]
allow_subprocess = true
allow_binaries = [
    "/usr/bin/chromium",
    "/usr/bin/google-chrome",
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome",
    "/opt/homebrew/bin/chromium",
]

[resources]
memory_mb = 2048
cpu_percent = 75
pids_max = 200
nofile = 1024
tool_call_timeout_seconds = 120

[tool_policy]
require_approval = []
deny = []

[[tool_policy.rules]]
tool = "puppeteer_screenshot"
when = "args.url.startsWith('file://') || args.url.startsWith('chrome://')"
action = "deny"

[platform.linux]
seccomp_preset = "permissive"
landlock = true

[platform.macos]
endpoint_security = false
