schema_version = "1.0"
name = "sqlite"
version = "0.6.2"
description = "SQLite MCP server: query a local database file."
homepage = "https://github.com/modelcontextprotocol/servers/tree/main/src/sqlite"
license = "MIT"

[command]
program = "uvx"
args = ["mcp-server-sqlite", "--db-path", "${SQLITE_DB:-$HATCH_STATE_DIR/sqlite/db.sqlite}"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = []
allow_dns = []
allow_http = false

[filesystem]
read = ["$HATCH_STATE_DIR"]
write = ["$HATCH_STATE_DIR"]
tmpfs = ["/tmp"]

[env]
passthrough = ["SQLITE_DB"]

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 128
cpu_percent = 25
pids_max = 25
nofile = 128
tool_call_timeout_seconds = 30

[tool_policy]
require_approval = []
deny = []

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
