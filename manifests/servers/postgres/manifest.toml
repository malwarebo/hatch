schema_version = "1.0"
name = "postgres"
version = "0.6.2"
description = "Postgres MCP server: query a configured database."
homepage = "https://github.com/modelcontextprotocol/servers/tree/main/src/postgres"
license = "MIT"

[command]
program = "npx"
args = ["-y", "@modelcontextprotocol/server-postgres", "${POSTGRES_URL}"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = []
allow_dns = ["*.rds.amazonaws.com", "*.supabase.co", "*.neon.tech", "*.googleusercontent.com"]
allow_http = false

[filesystem]
read = []
write = []
tmpfs = ["/tmp"]

[env]
passthrough = ["POSTGRES_URL", "PGSSLMODE"]

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 256
cpu_percent = 25
pids_max = 25
nofile = 128
tool_call_timeout_seconds = 60

[tool_policy]
require_approval = []
deny = []

[[tool_policy.rules]]
tool = "query"
when = "args.sql.matches('(?i)^\\s*(DROP|TRUNCATE|DELETE|ALTER|GRANT|REVOKE|CREATE\\s+USER)')"
action = "require_approval"

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
