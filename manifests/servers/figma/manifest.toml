schema_version = "1.0"
name = "figma"
version = "0.5.0"
description = "Figma MCP server: read file structure, components, and styles."
homepage = "https://github.com/GLips/Figma-Context-MCP"
license = "MIT"

[command]
program = "npx"
args = ["-y", "figma-developer-mcp"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = ["api.figma.com", "*.figma.com"]
allow_dns = ["api.figma.com", "*.figma.com"]
allow_http = false

[filesystem]
read = []
write = []
tmpfs = ["/tmp"]

[env]
passthrough = ["FIGMA_API_KEY"]

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 256
cpu_percent = 25
pids_max = 25
nofile = 128
tool_call_timeout_seconds = 60

[tool_policy]
require_approval = []
deny = []

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
