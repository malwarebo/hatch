schema_version = "1.0"
name = "filesystem"
version = "0.6.2"
description = "Filesystem MCP server: read/write files under declared roots."
homepage = "https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem"
license = "MIT"

[command]
program = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "$PROJECT_ROOT"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = []
allow_dns = []
allow_http = false

[filesystem]
read = ["$PROJECT_ROOT"]
write = ["$PROJECT_ROOT"]
tmpfs = ["/tmp"]

[env]
passthrough = []

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 256
cpu_percent = 25
pids_max = 25
nofile = 256
tool_call_timeout_seconds = 30

[tool_policy]
require_approval = []
deny = []

[[tool_policy.rules]]
tool = "write_file"
when = "args.path.endsWith('.env') || args.path.endsWith('.git/config')"
action = "require_approval"

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
