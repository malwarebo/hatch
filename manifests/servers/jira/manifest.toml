schema_version = "1.0"
name = "jira"
version = "0.1.0"
description = "Jira MCP server: query and update issues."
homepage = "https://github.com/sooperset/mcp-atlassian"
license = "MIT"

[command]
program = "uvx"
args = ["mcp-atlassian"]
working_dir = "$HATCH_RUNTIME_DIR"

[network]
allow_https = ["*.atlassian.net", "*.atlassian.com"]
allow_dns = ["*.atlassian.net", "*.atlassian.com"]
allow_http = false

[filesystem]
read = []
write = []
tmpfs = ["/tmp"]

[env]
passthrough = ["ATLASSIAN_URL", "ATLASSIAN_USERNAME", "ATLASSIAN_API_TOKEN", "JIRA_URL"]

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 256
cpu_percent = 25
pids_max = 25
nofile = 128
tool_call_timeout_seconds = 60

[tool_policy]
require_approval = []
deny = []

[[tool_policy.rules]]
tool = "delete_issue"
action = "require_approval"

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
