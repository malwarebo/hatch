schema_version = "1.0"
name = "cattest"
version = "0.1.0"
description = "Integration-test fixture: cat reads stdin and writes stdout"

[command]
program = "/bin/cat"
args = []

[network]
allow_https = []
allow_dns = []

[filesystem]
read = []
write = []
tmpfs = ["/tmp"]

[env]
passthrough = []

[exec]
allow_subprocess = false
allow_binaries = []

[resources]
memory_mb = 64
cpu_percent = 10
pids_max = 10
nofile = 32
tool_call_timeout_seconds = 30

[tool_policy]
require_approval = []
deny = []

[platform.linux]
seccomp_preset = "strict"
landlock = true

[platform.macos]
endpoint_security = false
